<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDA Admin Page</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <script src="admin.js" defer></script>
    <link rel="icon" href="assets/icons/sda_icon.png" type="image/x-icon">
</head>
<body>
    <div id="flip-card">
        <div id="card-inner">
            <div class="card-side card-back" id="result"></div>
            <div class="d-flex justify-content-center align-items-center card-side" style="width: 100vw; height: 100vh;" id="login">
                <form class="bg-dark shadow rounded shadow col-3 px-5 pt-5 pb-4">
                    <div class="form-group d-flex justify-content-center">
                        <h1 class="text-primary">Schedule Login</h1>
                    </div>
                    <div class="form-group">
                        <label for="username" class="text-white">Enter Username:</label>
                        <input type="text" id="username" placeholder="Username" class="form-control shadow px-2" value="">
                    </div>
                    <div class="form-group">
                        <label for="password" class="text-white">Enter Password:</label>
                        <input type="password" id="password" placeholder="Password" class="form-control shadow px-2" value="">
                        <div class="invalid-feedback" id="return"></div>
                    </div>
                    <div class="form-group d-flex justify-content-center">
                        <input class="btn btn-outline-primary shadow px-5 py-2 mt-5" onclick="login()" type="button" value="Login">
                    </div>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct" crossorigin="anonymous"></script>
</body>
</html>
