<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>temp</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css" integrity="sha384-xOolHFLEh07PJGoPkLv1IbcEPTNtaed2xpHsD9ESMhqIYd0nLMwNLD69Npy4HI+N" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
    <link rel="icon" href="assets/icons/sda_icon.png" type="image/x-icon">
</head>
<body>
    <div class="p-5">
        <h1 class="text-primary">Schedule:</h1>
        <div class="d-flex align-items-center bg-primary rounded shadow p-4 col-12" id="events-array"></div>
        <div class="d-none justify-content-center align-items-center mt-4" id="edit-item"></div>
        <form class="form-inline">
            <div class="d-flex bg-dark rounded shadow form-group mt-2 p-5 col-12">
                <button class="form-control btn btn-outline-success mx-1" type="button" onclick="addEvent()">Add Event</button>
                <button class="form-control btn btn-outline-warning mx-1" type="button">Edit</button>
                <button class="form-control btn btn-outline-danger mx-1" type="button">Remove Event</button>
                <label for="item-filter" class="text-white ml-2 mr-5">Filters: </label>
                <input type="text" placeholder="Search" class="form-control mx-1" value="" id="item-filter">
            </div>
        </form>
        <from class="form-group p-5">
            <label for="create-event-name">Event Name:</label>
            <input type="text" placeholder="Event" class="form-control" id="create-event-name">
            <label for="create-date">Date:</label>
            <div class="d-flex justify-content-center" id="create-date">
                <input type="date" class="form-control" id="create-date">
                <input type="text" class="form-control" id>
            </div>
            <label for="create-event-description">Description: </label>
            <input type="text" placeholder="Description" class="form-control" id="create-event-description">
        </from>
    </div>
    <script src="schedule.js" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery@3.5.1/dist/jquery.slim.min.js" integrity="sha384-DfXdz2htPH0lsSSs5nCTpuj/zy4C+OGpamoFVy38MVBnE+IbbVYUew+OrCXaRkfj" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-Fy6S3B9q64WdZWQUiU+q4/2Lc9npb8tCaSX9FK7E8HnRr0Jz8D6OP9dO5Vg3Q9ct" crossorigin="anonymous"></script>
</body>
</html>
